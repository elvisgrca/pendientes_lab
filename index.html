<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pendientes del lab</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f4f5f7; --fg: #1b1b1f; --card: #ffffff; --border: #e0e1e6;
    --muted: #6b6b76; --accent: #3457d5; --accent-soft: #eef1fd;
    --vencido: #c62828; --pronto: #b8720a; --ok: #2e7d32;
    --shadow: 0 1px 3px rgba(20,20,30,.06), 0 1px 2px rgba(20,20,30,.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#131317; --fg:#eaeaf0; --card:#1c1c22; --border:#2c2c34; --muted:#9a9aa5;
      --accent:#7d9cff; --accent-soft: #232a42; --shadow: 0 1px 3px rgba(0,0,0,.35);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background:var(--bg); color:var(--fg); line-height:1.45;
  }
  header { padding: 1.6rem 1.5rem .6rem; max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin: 0 0 .3rem; letter-spacing: -.01em; }
  .sub { color: var(--muted); font-size: .85rem; }
  main { padding: 0 1.5rem 3rem; max-width: 1100px; margin: 0 auto; }
  .card { background: var(--card); border:1px solid var(--border); border-radius: 12px; padding: 1.1rem 1.2rem; margin: 1rem 0; box-shadow: var(--shadow); }
  .row { display:flex; gap:.5rem; flex-wrap: wrap; align-items:center; }
  button {
    padding:.55rem 1rem; border:1px solid var(--accent); border-radius:8px; background:var(--accent);
    color:#fff; cursor:pointer; font-size:.85rem; font-weight:500; transition: opacity .15s, background .15s;
  }
  button:hover { opacity:.88; }
  button:disabled { opacity:.5; cursor:default; }
  button.secondary { background: transparent; color: var(--fg); border-color: var(--border); }
  button.secondary:hover { background: var(--bg); opacity:1; }
  button.filtro.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight:600; }
  button.small { padding:.3rem .6rem; font-size:.78rem; }
  .chips { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.7rem; }
  .chip {
    display:flex; align-items:center; gap:.3rem; padding:.4rem .3rem .4rem .8rem; border-radius:20px;
    border:1px solid var(--border); background:var(--bg); cursor:pointer; font-size:.85rem; transition: border-color .15s, background .15s;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.active { border-color: var(--accent); background: var(--accent-soft); font-weight:600; }
  .chip .count { color: var(--muted); font-weight:400; }
  .chip button { padding: 0 .5rem; font-size: .8rem; background:transparent; color:var(--muted); border:none; border-radius:50%; }
  .chip button:hover { color: var(--vencido); opacity:1; background:transparent; }
  details.ocultos { font-size: .8rem; color: var(--muted); margin-top: .8rem; }
  details.ocultos summary { cursor: pointer; }
  .table-wrap { overflow-x: auto; margin: .5rem -.2rem 0; padding: 0 .2rem; }
  table { width:100%; border-collapse: collapse; }
  th, td { text-align:left; padding:.65rem .7rem; font-size:.85rem; vertical-align: top; white-space: nowrap; }
  td { white-space: normal; }
  th {
    color: var(--muted); font-weight:600; font-size:.72rem; text-transform: uppercase; letter-spacing:.03em;
    border-bottom:2px solid var(--border); position: sticky; top:0; background: var(--card);
  }
  tbody tr { border-bottom:1px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:nth-child(even) { background: color-mix(in srgb, var(--border) 25%, transparent); }
  tbody tr:hover { background: var(--accent-soft); }
  .badge { display:inline-block; padding:.2rem .55rem; border-radius:12px; font-size:.72rem; font-weight:600; white-space:nowrap; }
  .badge.pendiente { background:#fdecc8; color:#8a5a00; }
  .badge.progreso { background:#d6e4ff; color:#1d4ed8; }
  .badge.resuelto { background:#d9f2d9; color:#256029; }
  .deadline.vencido { color: var(--vencido); font-weight:600; }
  .deadline.pronto { color: var(--pronto); font-weight:600; }
  .stale { color: var(--vencido); font-size:.8rem; margin-left:.3rem; white-space: nowrap; }
  .empty { color:var(--muted); padding: 2.5rem 0; text-align:center; font-size:.9rem; }
  .error { color: var(--vencido); font-size: .85rem; padding: .6rem 0; }
  .alumno-col { font-weight:600; }
  footer { color:var(--muted); font-size:.8rem; text-align:center; padding: 1.5rem 1rem; }
</style>
</head>
<body>
<header>
  <h1>Pendientes del lab</h1>
  <div class="sub">Los alumnos registran sus pendientes por Google Forms. Usa el botón de cada fila para marcarlos como resueltos.</div>
</header>
<main>

  <section class="card">
    <div class="chips" id="chips"></div>
    <div id="ocultosPanel"></div>
    <div class="row" style="margin-top:.8rem" id="filtroEstado">
      <button type="button" class="secondary filtro active" data-filtro="activos">Activos</button>
      <button type="button" class="secondary filtro" data-filtro="todos">Todos</button>
      <button type="button" class="secondary filtro" data-filtro="resueltos">Solo resueltos</button>
    </div>
  </section>

  <section class="card" id="resultado">
    <div class="empty">Cargando…</div>
  </section>

</main>
<footer>GitHub Pages · datos vía CSV publicado de Google Sheets</footer>

<script>
const STALE_DAYS = 14;
const SOON_DAYS = 3;
// Sheet único de respuestas del Form (Marca temporal, Alumno, Pendiente, Contexto,
// Fecha límite, Notas, Estado). Estado se agrega a mano, vacío = Pendiente.
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRnQUcegN1pFjboILWJKc_TVzYvRamxpEHsucEpXuTxGo6jwuVhmIi4O-QMeXqBM9_TkB2tznnZdFIe/pub?gid=730028715&single=true&output=csv';
// Pestaña "AlumnosOcultos" (columna Alumno) del mismo Sheet.
const OCULTOS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRnQUcegN1pFjboILWJKc_TVzYvRamxpEHsucEpXuTxGo6jwuVhmIi4O-QMeXqBM9_TkB2tznnZdFIe/pub?gid=879364831&single=true&output=csv';
// Apps Script Web App: marca resuelto / oculta / muestra un alumno.
const APPSCRIPT_URL = 'https://script.google.com/macros/s/AKfycby4ep65ye_htfoUZG_3t9fvzUL74rFedE6H90seL-l579Smv9PQHtEGMPEBywIscW4/exec';

let allRecords = [];
let ocultos = new Set();
let alumnoFiltro = null;      // null = todos
let estadoFiltro = 'activos'; // 'activos' | 'todos' | 'resueltos'

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Distintos alumnos pueden escribir su nombre con espacios de más; se agrupan igual.
function normalizeAlumno(s) {
  return (s || '').trim().replace(/\s+/g, ' ');
}

// Parser CSV mínimo con soporte de comillas (campos con comas/saltos de línea).
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && text[i+1] === '\n') i++;
        row.push(field); field = '';
        if (row.length > 1 || row[0] !== '') rows.push(row);
        row = [];
      } else field += c;
    }
  }
  if (field !== '' || row.length) { row.push(field); rows.push(row); }
  return rows;
}

// Marca temporal viene con hora ("3/7/2026 21:01:19"); solo nos importa el día.
function stripTime(s) {
  return s.replace(/\s+\d{1,2}:\d{2}(:\d{2})?\s*$/, '');
}

// El Sheet puede tener un locale distinto (dd/mm/yyyy vs mm/dd/yyyy); se infiere
// del propio dato: si el primer número de alguna fecha pasa de 12, ese slot solo
// puede ser el día.
function detectSlashDateOrder(rawValues) {
  let firstOver12 = false, secondOver12 = false;
  for (const v of rawValues) {
    const m = v && stripTime(v.trim()).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (!m) continue;
    if (+m[1] > 12) firstOver12 = true;
    if (+m[2] > 12) secondOver12 = true;
  }
  if (firstOver12) return 'dmy';
  if (secondOver12) return 'mdy';
  return 'dmy'; // ambiguo (todos los valores <=12): default más común en el lab
}

function parseDateFlexible(str, order) {
  if (!str) return null;
  str = stripTime(str.trim());
  if (!str) return null;
  let m = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) {
    return order === 'mdy'
      ? new Date(+m[3], +m[1]-1, +m[2])
      : new Date(+m[3], +m[2]-1, +m[1]);
  }
  const d = new Date(str);
  return isNaN(d) ? null : d;
}

function estadoClass(estado) {
  const e = (estado || '').trim().toLowerCase();
  if (e === 'resuelto') return 'resuelto';
  if (e === 'en progreso') return 'progreso';
  return 'pendiente';
}

async function fetchPendientes() {
  const text = await (await fetch(SHEET_URL, { cache: 'no-store' })).text();
  const rows = parseCSV(text);
  if (!rows.length) return [];
  const headers = rows[0].map(h => h.trim());
  const idx = name => headers.indexOf(name);
  const iTS = idx('Marca temporal'), iAlumno = idx('Alumno'), iPendiente = idx('Pendiente'),
        iContexto = idx('Contexto'), iLimite = idx('Fecha límite'), iNotas = idx('Notas'), iEstado = idx('Estado');
  const dataRows = rows.slice(1).filter(r => r.some(c => c.trim() !== ''));
  const order = detectSlashDateOrder(dataRows.flatMap(r => [r[iTS], r[iLimite]]));
  return dataRows.map(r => ({
    ts: (r[iTS] || '').trim(),
    alumno: normalizeAlumno(r[iAlumno]),
    fecha: parseDateFlexible(r[iTS], order),
    pendiente: r[iPendiente] || '',
    contexto: r[iContexto] || '',
    fechaLimiteRaw: r[iLimite] || '',
    fechaLimite: parseDateFlexible(r[iLimite], order),
    estado: (r[iEstado] || '').trim(),
    notas: r[iNotas] || '',
  }));
}

async function fetchOcultos() {
  const text = await (await fetch(OCULTOS_URL, { cache: 'no-store' })).text();
  const rows = parseCSV(text);
  if (!rows.length) return [];
  const headers = rows[0].map(h => h.trim());
  const iAlumno = headers.indexOf('Alumno');
  return rows.slice(1)
    .map(r => normalizeAlumno(r[iAlumno]))
    .filter(Boolean);
}

function sortRecords(records) {
  return records.slice().sort((a, b) => {
    const aHas = !!a.fechaLimite, bHas = !!b.fechaLimite;
    if (aHas && bHas) return a.fechaLimite - b.fechaLimite;
    if (aHas !== bHas) return aHas ? -1 : 1;
    return (a.fecha || 0) - (b.fecha || 0);
  });
}

function daysBetween(a, b) { return Math.floor((b - a) / 86400000); }

function filterByEstado(records, filtro) {
  return records.filter(r => {
    const resuelto = r.estado.toLowerCase() === 'resuelto';
    if (filtro === 'resueltos') return resuelto;
    if (filtro === 'todos') return true;
    return !resuelto;
  });
}

async function llamarAppScript(params) {
  const res = await fetch(APPSCRIPT_URL, { method: 'POST', body: new URLSearchParams(params) });
  return res.json();
}

async function marcarResuelto(ts, btn) {
  btn.disabled = true;
  btn.textContent = 'Marcando…';
  try {
    const data = await llamarAppScript({ accion: 'resolver', ts });
    if (!data.ok) { alert('No se pudo marcar: ' + (data.error || 'error desconocido')); btn.disabled = false; btn.textContent = 'Marcar resuelto'; return; }
    await cargarTodo();
  } catch (e) {
    alert('Error de red: ' + e.message);
    btn.disabled = false; btn.textContent = 'Marcar resuelto';
  }
}

async function ocultarAlumno(alumno) {
  if (!confirm(`¿Ocultar a ${alumno} de la vista? Sus registros no se borran, solo se dejan de mostrar; puedes volver a mostrarlo después.`)) return;
  try {
    const data = await llamarAppScript({ accion: 'ocultar', alumno });
    if (!data.ok) { alert('No se pudo ocultar: ' + (data.error || 'error desconocido')); return; }
    await cargarTodo();
  } catch (e) { alert('Error de red: ' + e.message); }
}

async function mostrarAlumno(alumno) {
  try {
    const data = await llamarAppScript({ accion: 'mostrar', alumno });
    if (!data.ok) { alert('No se pudo mostrar: ' + (data.error || 'error desconocido')); return; }
    await cargarTodo();
  } catch (e) { alert('Error de red: ' + e.message); }
}

function renderTabla() {
  const el = document.getElementById('resultado');
  let records = allRecords.filter(r => !ocultos.has(r.alumno));
  if (alumnoFiltro) records = records.filter(r => r.alumno === alumnoFiltro);
  const filtered = filterByEstado(records, estadoFiltro);
  if (!filtered.length) {
    const msg = estadoFiltro === 'resueltos' ? ' resueltos' : estadoFiltro === 'todos' ? '' : ' activos';
    el.innerHTML = '<div class="empty">Sin pendientes' + msg + '.</div>';
    return;
  }
  const combined = !alumnoFiltro;
  const sorted = sortRecords(filtered);
  const today = new Date(); today.setHours(0,0,0,0);
  const rows = sorted.map(r => {
    let deadlineHtml = '<span style="color:var(--muted)">—</span>';
    if (r.fechaLimite) {
      const d = daysBetween(r.fechaLimite, today);
      const cls = d > 0 ? 'vencido' : (d >= -SOON_DAYS ? 'pronto' : '');
      const sufijo = d > 0 ? `vencido ${d}d` : d === 0 ? 'hoy' : `en ${-d}d`;
      const label = `${r.fechaLimiteRaw} (${sufijo})`;
      deadlineHtml = `<span class="deadline ${cls}">${escapeHtml(label)}</span>`;
    }
    let staleHtml = '';
    const resuelto = r.estado.toLowerCase() === 'resuelto';
    if (!resuelto && r.fecha) {
      const age = daysBetween(r.fecha, today);
      if (age >= STALE_DAYS) staleHtml = `<span class="stale" title="${age} días sin resolver">⚠ ${age}d</span>`;
    }
    const accion = resuelto ? '' : `<button type="button" class="small btn-resolver" data-ts="${escapeHtml(r.ts)}">Marcar resuelto</button>`;
    return `<tr>
      ${combined ? `<td class="alumno-col">${escapeHtml(r.alumno)}</td>` : ''}
      <td>${escapeHtml(r.pendiente)}</td>
      <td>${escapeHtml(r.contexto)}</td>
      <td>${deadlineHtml}</td>
      <td><span class="badge ${estadoClass(r.estado)}">${escapeHtml(r.estado)}</span></td>
      <td>${escapeHtml(r.ts)}${staleHtml}</td>
      <td>${escapeHtml(r.notas)}</td>
      <td>${accion}</td>
    </tr>`;
  }).join('');
  el.innerHTML = `<div class="table-wrap"><table>
    <thead><tr>
      ${combined ? '<th>Alumno</th>' : ''}
      <th>Pendiente</th><th>Contexto</th><th>Fecha límite</th><th>Estado</th><th>Fecha</th><th>Notas</th><th>Acciones</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function renderChips() {
  const chips = document.getElementById('chips');
  const counts = {};
  allRecords.forEach(r => {
    if (ocultos.has(r.alumno)) return;
    counts[r.alumno] = (counts[r.alumno] || 0) + 1;
  });
  const nombres = Object.keys(counts).sort((a, b) => a.localeCompare(b));
  const todosActive = alumnoFiltro === null;
  chips.innerHTML = `<span class="chip ${todosActive ? 'active' : ''}" data-alumno="">Todos</span>` +
    nombres.map(n => `
      <span class="chip ${alumnoFiltro === n ? 'active' : ''}" data-alumno="${escapeHtml(n)}">
        ${escapeHtml(n)} <span class="count">${counts[n]}</span>
        <button class="chip-remove" data-alumno="${escapeHtml(n)}" title="Ocultar alumno">✕</button>
      </span>`).join('');

  const panel = document.getElementById('ocultosPanel');
  if (!ocultos.size) { panel.innerHTML = ''; }
  else {
    panel.innerHTML = `<details class="ocultos"><summary>${ocultos.size} alumno(s) oculto(s)</summary>
      <div class="chips">
        ${Array.from(ocultos).sort().map(n => `
          <span class="chip">${escapeHtml(n)}
            <button class="btn-mostrar" data-alumno="${escapeHtml(n)}" title="Mostrar de nuevo">↩</button>
          </span>`).join('')}
      </div>
    </details>`;
  }
}

document.body.addEventListener('click', e => {
  const chipRemove = e.target.closest('.chip-remove');
  if (chipRemove) { ocultarAlumno(chipRemove.dataset.alumno); return; }
  const btnResolver = e.target.closest('.btn-resolver');
  if (btnResolver) { marcarResuelto(btnResolver.dataset.ts, btnResolver); return; }
  const btnMostrar = e.target.closest('.btn-mostrar');
  if (btnMostrar) { mostrarAlumno(btnMostrar.dataset.alumno); return; }
  const chip = e.target.closest('.chip[data-alumno]');
  if (chip) { alumnoFiltro = chip.dataset.alumno || null; renderChips(); renderTabla(); return; }
});

document.querySelectorAll('#filtroEstado .filtro').forEach(btn => {
  btn.addEventListener('click', () => {
    estadoFiltro = btn.dataset.filtro;
    document.querySelectorAll('#filtroEstado .filtro').forEach(b => b.classList.toggle('active', b === btn));
    renderTabla();
  });
});

async function cargarTodo() {
  const el = document.getElementById('resultado');
  el.innerHTML = '<div class="empty">Cargando…</div>';
  try {
    const [records, ocultosList] = await Promise.all([fetchPendientes(), fetchOcultos()]);
    allRecords = records;
    ocultos = new Set(ocultosList);
    renderChips();
    renderTabla();
  } catch (e) {
    el.innerHTML = `<div class="error">No se pudo cargar: ${escapeHtml(e.message)}</div>`;
  }
}

// Arranque: soporta ?alumno=<nombre> para abrir directo filtrado a un alumno.
(async function init() {
  const params = new URLSearchParams(location.search);
  if (params.get('selftest') === '1') return; // no disparar red durante el autocheck
  const a = params.get('alumno');
  if (a) alumnoFiltro = normalizeAlumno(a);
  await cargarTodo();
})();

// Autocheck del parser CSV y de fechas: abrir index.html?selftest=1
if (new URLSearchParams(location.search).get('selftest') === '1') {
  (function selftest() {
    const results = [];
    const check = (label, got, want) => results.push({ label, ok: JSON.stringify(got) === JSON.stringify(want), got, want });

    const csv = 'Fecha,Pendiente,Contexto,Fecha límite,Estado,Notas\n' +
      '15/03/2026,"Corregir cap. 2, intro","Falta ""marco teórico""\ncompleto",,Pendiente,\n' +
      '01/01/2026,Revisar figuras,ok,20/01/2026,Resuelto,listo';
    const rows = parseCSV(csv);
    check('parseCSV filas', rows.length, 3);
    check('parseCSV celda con comillas/coma', rows[1][1], 'Corregir cap. 2, intro');
    check('parseCSV celda con comillas escapadas y salto de línea', rows[1][2], 'Falta "marco teórico"\ncompleto');

    check('fecha ISO', parseDateFlexible('2026-03-15').getTime(), new Date(2026,2,15).getTime());
    check('fecha vacía', parseDateFlexible(''), null);

    check('orden dd/mm si algún día pasa de 12', detectSlashDateOrder(['15/03/2026', '01/02/2026']), 'dmy');
    check('orden mm/dd si algún mes-slot pasa de 12', detectSlashDateOrder(['03/15/2026', '01/02/2026']), 'mdy');
    check('orden ambiguo cae a dmy', detectSlashDateOrder(['03/04/2026']), 'dmy');
    check('fecha dd/mm/yyyy con orden inferido', parseDateFlexible('15/03/2026', 'dmy').getTime(), new Date(2026,2,15).getTime());
    check('fecha mm/dd/yyyy con orden inferido', parseDateFlexible('03/15/2026', 'mdy').getTime(), new Date(2026,2,15).getTime());
    check('marca temporal con hora se recorta al día', parseDateFlexible('3/7/2026 21:01:19', 'mdy').getTime(), new Date(2026,2,7).getTime());
    check('orden detectado ignora la hora', detectSlashDateOrder(['13/7/2026 21:01:19']), 'dmy');

    check('normaliza espacios de sobra', normalizeAlumno('Elvis   '), 'Elvis');
    check('normaliza espacios internos dobles', normalizeAlumno('Elvis  Garcia'), 'Elvis Garcia');

    const recs = [
      { fecha: new Date(2026,0,1), fechaLimite: new Date(2026,5,1) },
      { fecha: new Date(2026,0,2), fechaLimite: new Date(2026,1,1) },
      { fecha: new Date(2026,0,1), fechaLimite: null },
      { fecha: new Date(2025,0,1), fechaLimite: null },
    ];
    const orden = sortRecords(recs).map(r => r.fechaLimite ? +r.fechaLimite : 'sin-fecha:' + r.fecha.getFullYear());
    check('orden por urgencia', orden, [+new Date(2026,1,1), +new Date(2026,5,1), 'sin-fecha:2025', 'sin-fecha:2026']);

    const estados = [{estado:'Pendiente'}, {estado:'En progreso'}, {estado:'Resuelto'}];
    check('filtro activos oculta resueltos', filterByEstado(estados,'activos').map(r=>r.estado), ['Pendiente','En progreso']);
    check('filtro todos muestra todo', filterByEstado(estados,'todos').map(r=>r.estado), ['Pendiente','En progreso','Resuelto']);
    check('filtro solo resueltos', filterByEstado(estados,'resueltos').map(r=>r.estado), ['Resuelto']);

    const html = results.map(r => `<div style="color:${r.ok?'green':'red'}">${r.ok?'PASS':'FAIL'} — ${r.label}` +
      (r.ok ? '' : ` (esperado ${JSON.stringify(r.want)}, obtuve ${JSON.stringify(r.got)})`) + '</div>').join('');
    document.getElementById('resultado').innerHTML = `<h3>Selftest</h3>${html}`;
    console.log('selftest', results);
  })();
}
</script>
</body>
</html>
